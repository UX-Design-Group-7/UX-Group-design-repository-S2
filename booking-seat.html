<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Seat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="nav-left" onclick="goBack()" style="cursor: pointer;">←</div>
      Select Seats
      <div class="nav-right"></div>
    </header>

    <main class="screen-content">
      <div class="progress">
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot"></div><div class="line"></div>
        <div class="dot"></div>
      </div>

      <section class="seat-card compact">
        <div class="seat-title seat-title-center">Number of Tickets</div>
        <div class="ticket-step-controls centered">
          <button class="step-button" type="button">−</button>
          <div class="ticket-count">1</div>
          <button class="step-button" type="button">+</button>
        </div>
      </section>

      <section class="ticket-type-grid">
        <button class="ticket-type active" type="button">
          <span>Stalls</span>
          <small>£65 per seat</small>
          <span class="type-check">✓</span>
        </button>
        <button class="ticket-type" type="button">
          <span>Dress Circle</span>
          <small>£55 per seat</small>
        </button>
        <button class="ticket-type" type="button">
          <span>Grand Circle</span>
          <small>£45 per seat</small>
        </button>
        <button class="ticket-type" type="button">
          <span>Balcony</span>
          <small>£70 per seat</small>
        </button>
      </section>

      <div class="stage-pill">STAGE</div>

      <section class="seat-layout-card">
        <div class="seat-layout-top">
          <strong>Stalls</strong>
          <span>0 / 1 Selected</span>
        </div>

        <div class="seat-rows exact-seat-rows">
          <div class="seat-row exact-row">
            <div class="row-label">A</div>
            <div class="seat-stack">
              <div class="seat-row-grid exact-grid">
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">2</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">4</button>
                <button class="seat-circle" type="button">5</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">7</button>
              </div>
              <div class="seat-row-grid exact-grid lower-grid">
                <button class="seat-circle" type="button">8</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle selected" type="button" onclick="goToPayment()">9</button>
                <button class="seat-circle" type="button">11</button>
                <button class="seat-circle" type="button">12</button>
              </div>
            </div>
          </div>

          <div class="seat-row exact-row">
            <div class="row-label">B</div>
            <div class="seat-stack">
              <div class="seat-row-grid exact-grid">
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">2</button>
                <button class="seat-circle" type="button">3</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">5</button>
                <button class="seat-circle" type="button">6</button>
                <button class="seat-circle" type="button">7</button>
              </div>
              <div class="seat-row-grid exact-grid lower-grid">
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">9</button>
                <button class="seat-circle" type="button">10</button>
                <button class="seat-circle" type="button">11</button>
                <button class="seat-circle unavailable" type="button">×</button>
              </div>
            </div>
          </div>

          <div class="seat-row exact-row">
            <div class="row-label">C</div>
            <div class="seat-stack">
              <div class="seat-row-grid exact-grid">
                <button class="seat-circle" type="button">1</button>
                <button class="seat-circle" type="button">2</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">5</button>
                <button class="seat-circle" type="button">6</button>
                <button class="seat-circle unavailable" type="button">×</button>
              </div>
              <div class="seat-row-grid exact-grid lower-grid">
                <button class="seat-circle" type="button">8</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">11</button>
                <button class="seat-circle" type="button">12</button>
              </div>
            </div>
          </div>

          <div class="seat-row exact-row">
            <div class="row-label">D</div>
            <div class="seat-stack">
              <div class="seat-row-grid exact-grid">
                <button class="seat-circle" type="button">1</button>
                <button class="seat-circle" type="button">2</button>
                <button class="seat-circle" type="button">3</button>
                <button class="seat-circle" type="button">4</button>
                <button class="seat-circle" type="button">5</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">7</button>
              </div>
              <div class="seat-row-grid exact-grid lower-grid">
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">11</button>
                <button class="seat-circle" type="button">12</button>
              </div>
            </div>
          </div>

          <div class="seat-row exact-row">
            <div class="row-label">E</div>
            <div class="seat-stack">
              <div class="seat-row-grid exact-grid">
                <button class="seat-circle" type="button">1</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">3</button>
                <button class="seat-circle" type="button">4</button>
                <button class="seat-circle" type="button">5</button>
                <button class="seat-circle" type="button">6</button>
                <button class="seat-circle" type="button">7</button>
              </div>
              <div class="seat-row-grid exact-grid lower-grid">
                <button class="seat-circle" type="button">8</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle unavailable" type="button">×</button>
                <button class="seat-circle" type="button">11</button>
                <button class="seat-circle" type="button">12</button>
              </div>
            </div>
          </div>
        </div>

        <div class="legend seat-legend">
          <div class="key"><span class="box free"></span>Available</div>
          <div class="key"><span class="box yours"></span>Unavailable</div>
          <div class="key"><span class="box taken"></span>Taken</div>
        </div>
      </section>

      <section class="seat-total">
        <div class="summary-row total-line"><strong>Total</strong><span>£65</span></div>
        <button class="btn btn-primary btn-block" type="button" onclick="goToPayment()">Continue</button>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="browse.html"><span class="icon">🏠</span><span>Home</span></a>
      <a href="browse.html"><span class="icon">🔎</span><span>Browse</span></a>
      <a href="saved.html"><span class="icon">💗</span><span>Saved</span></a>
      <a href="tickets.html"><span class="icon">🎫</span><span>Ticket</span></a>
      <a href="profile.html"><span class="icon">👤</span><span>Profile</span></a>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
