<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHelper Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame auth-screen">
    <div class="status-bar">
      <div>9:41</div>
      <div class="status-icons">
        <span>◔</span>
        <span>📶</span>
        <span>▭</span>
      </div>
    </div>

    <div class="brand">EventHelper</div>
    <div class="welcome">Welcome Back</div>
    <div class="subtitle">Sign in to your account</div>

    <button class="social-btn" type="button" onclick="window.location.href='browse.html'">
      <span class="social-icon">G</span>
      <span>Continue with Google</span>
    </button>

    <button class="social-btn" type="button" onclick="window.location.href='browse.html'">
      <span class="social-icon">✉</span>
      <span>Continue with Email</span>
    </button>

    <div class="divider-text">Or Sign in with</div>

    <div class="form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span>◠</span>
          <input id="username" type="text" placeholder="Enter your username" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span>⌂</span>
          <input id="password" type="password" placeholder="Enter your password" />
        </div>
      </div>

      <a href="#" class="forgot">Forgot Password?</a>

      <button class="btn signin-btn" type="button" onclick="window.location.href='browse.html'">Sign In</button>
    </div>

    <div class="signup">
      Don’t have an account? <a href="signup.html">Register / Sign Up</a>
    </div>
  </div>
</body>
</html>
