<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Methods</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="nav-left" onclick="goBack()" style="cursor: pointer;">←</div>
      Payment Methods
      <div class="nav-right"></div>
    </header>

    <main class="screen-content">
      <!-- Add New Card -->
      <section class="booking-section">
        <button class="btn btn-outline btn-block" type="button">+ Add New Card</button>
      </section>

      <!-- Saved Cards -->
      <section class="booking-section">
        <h2 class="section-heading">💳 Your Cards</h2>
        
        <!-- Card 1 -->
        <div class="card-item">
          <div class="card-info">
            <div class="card-number">•••• •••• •••• 5342</div>
            <div class="card-holder">Jane Doe</div>
            <div class="card-expiry">Expires 12/27</div>
          </div>
          <div class="card-badge">Default</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline" style="flex: 1;">Remove</button>
        </div>

        <!-- Card 2 -->
        <div class="card-item">
          <div class="card-info">
            <div class="card-number">•••• •••• •••• 2682</div>
            <div class="card-holder">Jane Doe</div>
            <div class="card-expiry">Expires 05/26</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline" style="flex: 0.5; margin-right: 8px;">Set as Default</button>
          <button class="btn btn-outline" style="flex: 0.5;">Remove</button>
        </div>
      </section>

      <!-- Secure Payments -->
      <section class="booking-section">
        <h2 class="section-heading">🔒 Secure Payments</h2>
        <p class="small" style="padding: 0 18px; color: var(--muted); line-height: 1.5;">Your payment information is encrypted and secure. We never share your card details with third parties.</p>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="browse.html"><span class="icon">🏠</span><span>Home</span></a>
      <a href="browse.html"><span class="icon">🔎</span><span>Browse</span></a>
      <a href="saved.html"><span class="icon">💗</span><span>Saved</span></a>
      <a href="tickets.html"><span class="icon">🎫</span><span>Ticket</span></a>
      <a class="active" href="profile.html"><span class="icon">👤</span><span>Profile</span></a>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
