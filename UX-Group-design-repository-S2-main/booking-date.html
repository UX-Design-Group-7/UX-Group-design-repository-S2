<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Date</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="nav-left" onclick="goBack()" style="cursor: pointer;">←</div>
      Book Tickets
      <div class="nav-right"></div>
    </header>

    <main class="screen-content">
      <div class="progress">
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot"></div><div class="line"></div>
        <div class="dot"></div><div class="line"></div>
        <div class="dot"></div>
      </div>

      <div class="page-pad small muted">Date</div>
      <div class="calendar">
        <div class="calendar-header"><span>◀ Mar 2026 ▶</span><span></span></div>
        <div class="calendar-grid">
          <div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div>
          <div>10</div><div>11</div><div>12</div><div>13</div><div class="day active">14</div>
          <div>15</div><div>16</div><div>17</div><div>18</div><div>19</div>
          <div>20</div><div>21</div><div>22</div><div>23</div><div>24</div>
        </div>
      </div>

      <div class="section-title">TIMES AVAILABLE - FRI 14 MAR</div>
      <div class="time-options">
        <div class="time-btn active">2:00pm</div>
        <div class="time-btn">7:30PM</div>
      </div>

      <button class="btn btn-primary btn-block" type="button" onclick="goToSeat()">NEXT: Choose a Seat</button>
    </main>

    <nav class="bottom-nav">
      <a href="browse.html"><span class="icon">🏠</span><span>Home</span></a>
      <a href="browse.html"><span class="icon">🔎</span><span>Browse</span></a>
      <a href="saved.html"><span class="icon">💗</span><span>Saved</span></a>
      <a href="tickets.html"><span class="icon">🎫</span><span>Ticket</span></a>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
