<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>Browse Events</header>

    <main class="screen-content">
      <div class="search-wrap">
        <div class="search">
          <span>🔎</span>
          <input type="text" placeholder="Search event..." />
        </div>
      </div>


<main>
  <div class="section-title">BROWSE BY CATEGORY</div>
  <div class="chips" role="tablist" aria-label="Browse by category">
    <div class="chip" data-filter="opera" role="tab" aria-selected="true" tabindex="0" onclick="applyFilter('opera')">🎭 Opera</div>
    <div class="chip" data-filter="ballet" role="tab" aria-selected="false" tabindex="0" onclick="applyFilter('ballet')">🩰 Ballet</div>
    <div class="chip" data-filter="music" role="tab" aria-selected="false" tabindex="0" onclick="applyFilter('music')">🎵 Music</div>
  </div>

  <div class="section-title">COMING UP SOON</div>
  <div class="list events-list">
    <div class="card" role="button" tabindex="0" data-id="evt-1" data-category="opera" onclick="goToEvent()" style="cursor:pointer;">
      <div class="icon">🎭</div>
      <div class="meta">
        <div class="title">La Traviata</div>
        <div class="subtitle">Leeds Grand · Fri 14 Mar</div>
        <div class="price">From £18</div>
      </div>
      <div class="fav" role="button" aria-pressed="false" tabindex="0">💗</div>
    </div>

    <div class="card" role="button" tabindex="0" data-id="evt-2" data-category="ballet" onclick="goToEvent()" style="cursor:pointer;">
      <div class="icon">🩰</div>
      <div class="meta">
        <div class="title">Swan Lake</div>
        <div class="subtitle">Carriageworks · Sat 22 Mar</div>
        <div class="price">From £24</div>
      </div>
      <div class="fav" role="button" aria-pressed="false" tabindex="0">💗</div>
    </div>

    <div class="card" role="button" tabindex="0" data-id="evt-3" data-category="music" onclick="goToEvent()" style="cursor:pointer;">
      <div class="icon">🎵</div>
      <div class="meta">
        <div class="title">Leeds Symphony Gala</div>
        <div class="subtitle">Town Hall · Sun 30 Mar</div>
        <div class="price">From £15</div>
      </div>
      <div class="fav" role="button" aria-pressed="false" tabindex="0">💗</div>
    </div>
  </div>
</main>






    <nav class="bottom-nav">
      <a class="active" href="browse.html"><span class="icon">🏠</span><span>Home</span></a>
      <a href="browse.html"><span class="icon">🔎</span><span>Browse</span></a>
      <a href="saved.html"><span class="icon">💗</span><span>Saved</span></a>
      <a href="tickets.html"><span class="icon">🎫</span><span>Ticket</span></a>
      <a href="profile.html"><span class="icon">👤</span><span>Profile</span></a>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
