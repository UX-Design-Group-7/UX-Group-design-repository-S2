<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="nav-left" onclick="goBack()" style="cursor: pointer;">←</div>
      Book Tickets
      <div class="nav-right"></div>
    </header>

    <main class="screen-content">
      <div class="progress">
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot active"></div><div class="line active"></div>
        <div class="dot"></div>
      </div>

      <div class="payment-summary">
        <div class="detail-copy">
          <div class="summary-row"><span class="label">Event</span><strong>La Traviata</strong></div>
          <div class="summary-row"><span class="label">Date</span><strong>Fri 14 Mar 7:30pm</strong></div>
          <div class="summary-row"><span class="label">Seat</span><strong>Stalls B4</strong></div>
          <div class="summary-row"><span class="label">Total</span><strong style="font-size:16px;">£28.00</strong></div>
        </div>
      </div>

      <div class="form-shell">
        <div class="form-group">
          <label for="card">Card number</label>
          <input id="card" type="text" value="1234 5678 9012 3456" />
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label for="expiry">Expiry</label>
            <input id="expiry" type="text" value="03 / 28" />
          </div>
          <div class="form-group">
            <label for="cvv">CVV</label>
            <input id="cvv" type="password" value="•••" />
          </div>
        </div>
        <div class="form-group">
          <label for="name">Name on card</label>
          <input id="name" type="text" value="Kenan Del Piero" />
        </div>
      </div>

      <div class="secure-note">🔒 Secure payment · SSL encrypted</div>

      <button class="btn btn-gold btn-block" type="button" onclick="goToConfirmation()">PAY £28.00 →</button>
    </main>

    <nav class="bottom-nav">
      <a href="browse.html"><span class="icon">🏠</span><span>Home</span></a>
      <a href="browse.html"><span class="icon">🔎</span><span>Browse</span></a>
      <a href="saved.html"><span class="icon">💗</span><span>Saved</span></a>
      <a href="tickets.html"><span class="icon">🎫</span><span>Ticket</span></a>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
