<!doctype html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>My Tickets</header>

<main class="screen-content">
  <div class="section-title">UPCOMING</div>
  <div class="list upcoming-list">
    <a class="event-card"
       href="confirmation.html?event=evt-1"
       aria-label="Open confirmation for La Traviata"
       style="display:block;background:var(--navy);color:#fff;box-shadow:none;text-decoration:none;">
      <div class="event-icon" style="background:rgba(255,255,255,0.12);">🎭</div>
      <div class="event-copy">
        <div class="event-title" style="color:#fff;">La Traviata</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Leeds Grand Theatre</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Fri 14 Mar 7:30pm</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Stalls Row B Seat 4</div>
      </div>
      <div class="status-badge">VIEW</div>
    </a>

    <a class="event-card"
       href="confirmation.html?event=evt-2"
       aria-label="Open confirmation for Swan Lake"
       style="display:block;background:#344b7e;color:#fff;box-shadow:none;text-decoration:none;">
      <div class="event-icon" style="background:rgba(255,255,255,0.12);">🩰</div>
      <div class="event-copy">
        <div class="event-title" style="color:#fff;">Swan Lake</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Carriageworks Theatre</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Sat 22 Mar 2:00pm</div>
        <div class="event-subtitle" style="color:#dbe1f1;">Circle Row A Seat 8</div>
      </div>
      <div class="status-badge">VIEW</div>
    </a>
  </div>


      <div class="section-title">PAST TICKETS</div>

        <div class="card">
          <div class="icon">🎭</div>
          <div class="meta">
            <div class="title">Don Giovanni</div>
            <div class="subtitle">Leeds Grand · 12 Jan 2026</div>
            <div class="subtitle">PAST</div>
          </div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
